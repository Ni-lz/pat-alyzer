name: Build Pat-alyzer dashboard

on:
  workflow_dispatch:
  schedule:
    # Tuesday and Friday after EuroMillions results should be available.
    - cron: "30 22 * * 2"
    - cron: "30 22 * * 5"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build once to refresh official CSV data
        run: python src/build_dashboard.py

      - name: Fetch missing machine metadata incrementally
        run: python tools/fetch_machine_metadata.py --limit 250 --pause 0.2 --incremental

      - name: Rebuild dashboard with latest metadata
        run: python src/build_dashboard.py

      - name: Commit generated files
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add -A
          git diff --cached --quiet || git commit -m "Update Pat-alyzer dashboard"
          git push
